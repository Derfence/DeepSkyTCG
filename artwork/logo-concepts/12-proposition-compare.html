<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proposition 12 • Comparaison Couleurs</title>
  <style>
    :root {
      --bg: #08101d;
      --panel: #101827;
      --line: rgba(234, 243, 255, 0.12);
      --text: #eaf3ff;
      --muted: #9cb3c9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(104, 225, 210, 0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(246, 183, 60, 0.12), transparent 22%),
        linear-gradient(180deg, #132540 0%, var(--bg) 42%, #05080d 100%);
    }

    main {
      max-width: 1560px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 4vw, 56px);
      line-height: 1;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)), var(--panel);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    .media {
      aspect-ratio: 2667 / 3750;
      background: linear-gradient(180deg, rgba(8, 16, 29, 0.86), rgba(4, 8, 13, 0.96));
    }

    .media img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .body {
      padding: 18px 18px 20px;
    }

    .label {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h2 {
      margin: 0;
      font-size: 24px;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Proposition 12 • Comparaison des branches</h1>
    <p>La composition reste identique. Seuls les dégradés des branches de l'étoile changent pour comparer les trois teintes plus facilement.</p>

    <section class="grid">
      <article class="card">
        <div class="media">
          <img src="./13-proposition-yellow.svg" alt="Proposition 12 jaune">
        </div>
        <div class="body">
          <div class="label">Version Jaune</div>
          <h2>Chaude et solaire</h2>
        </div>
      </article>

      <article class="card">
        <div class="media">
          <img src="./14-proposition-blue.svg" alt="Proposition 12 bleue">
        </div>
        <div class="body">
          <div class="label">Version Bleue</div>
          <h2>Froide et astrale</h2>
        </div>
      </article>

      <article class="card">
        <div class="media">
          <img src="./15-proposition-red.svg" alt="Proposition 12 rouge">
        </div>
        <div class="body">
          <div class="label">Version Rouge</div>
          <h2>Urbaine et periurbaine</h2>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
